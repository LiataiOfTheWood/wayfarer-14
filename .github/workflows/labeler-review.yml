name: "Labels: Approved"
on:
  pull_request_review:
    types: [submitted]
jobs:
  add_label:
    # Change the repository name after you've made sure the team name is correct for your fork!
    # Frontier: repo changed (space-wizards/space-station-14 < new-frontiers-14/frontier-station-14)
    # Wayfarer: new-frontiers-14/frontier-station-14 < project-wayfarer/wayfarer-14
    if: ${{ (github.repository == 'project-wayfarer/wayfarer-14') && (github.event.review.state == 'APPROVED') }}
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - uses: tspascoal/get-user-teams-membership@v3
      id: checkUserMember
      with:
        username: ${{ github.actor }}
        team: "reviewers" # Wayfarer: content-maintainers,junior-maintainers < reviewers
        GITHUB_TOKEN: ${{ secrets.LABELER_PAT }}
    - if: ${{ steps.checkUserMember.outputs.isTeamMember == 'true' }}
      uses: actions-ecosystem/action-add-labels@v1
      with:
        labels: "S: Approved"
