name: Wayfarer Cherrypick Request
description: Suggest an idea for this project
labels: ["Cherry Pick \U0001F352\U0001F44C", "S: Untriaged"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to fill out an issue. This template is intended for requesting a cherry pick :cherries::ok_hand: from another fork.
        For feedback or help running Wayfarer 14, please join our [Discord](https://discord.gg/QpVfma2eAp).
  - type: input
    attributes:
      label: Guidelines
      description: |
        Have you read the [Spacestation 14 PR Guidelines](https://docs.spacestation14.io/en/getting-started/pr-guideline)?
        Does this PR you are attaching adhere to those guidelines?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Licenses
      description: Have you checked the forks license agreement? Is it compatible with ours? If so, list their licenses here
    validations:
      required: true
  - type: textarea
    attributes:
      label: Features
      description: Please describe what this PR adds, and why you wish to have it included on the server
    validations:
      required: true
  - type: textarea
    attributes:
      label: Links
      description: Please link the PR('s) in question for consideration
    validations:
      required: true

